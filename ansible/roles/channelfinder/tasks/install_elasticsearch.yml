---

# Create host elasticsearch directory
- name: Create elasticsearch directory
  ansible.builtin.file:
    path: "{{ elasticsearch_directory }}"
    owner: epics-dev
    group: epics-dev
    mode: '0755'
    state: directory
    
# Install elasticsearch container
- name: Install elasticsearch container
  #become: true
  containers.podman.podman_container:
    name: es
    image: docker.elastic.co/elasticsearch/elasticsearch:{{ elasticsearch_version }}
    state: present
    expose:
      - 9200
      - 9300
    env:
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
      discovery.type: "single-node"
      xpack.security.enabled: "false"
      network.host: "127.0.0.1"
      bootstrap.memory_lock: "true"
    volume: "{{ elasticsearch_directory }}:/usr/share/elasticsearch/data"
    network: host
    auto_remove: true
    health_cmd: "curl http://localhost:9200/"
    healthcheck_start_period: "10m"


  when: is_debian

- name: Install required RPM dependencies
  become: true
  ansible.builtin.dnf:
    name:
      - mariadb-server
      - python3-PyMySQL
    update_cache: true
    state: present
  when: is_redhat

- name: Manage MariaDB service; create AA user and database
  become: true
  when: not in_container
  block:
    - name: Manage MariaDB service
      ansible.builtin.systemd_service:
        name: mariadb
        state: started
        enabled: true

    - name: MariaDB - create Archiver-Appliance database
      community.mysql.mysql_db:
        login_unix_socket: /var/lib/mysql/mysql.sock
        name: archappl

    - name: MariaDB - create Archiver-Appliance user
      community.mysql.mysql_user:
        login_unix_socket: /var/lib/mysql/mysql.sock
        name: archappl
        password: archappl
        priv: 'archappl.*:ALL'
        state: present
